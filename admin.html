<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITA CORE | 管理員後臺</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Helvetica Neue", Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- 登入介面 -->
    <div id="admin-login-view" class="max-w-md mx-auto mt-24 bg-white p-10 rounded-3xl shadow-sm border border-gray-100 text-center relative z-10">
        <div class="mb-6">
            <span class="text-4xl">🔒</span>
            <h2 class="mt-4 text-2xl font-bold tracking-tight text-gray-900">管理員登入</h2>
            <p class="mt-2 text-sm text-gray-500">請輸入憑證以進入後台管理</p>
        </div>
        <form id="admin-login-form" class="space-y-4 text-left">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
                <input type="text" id="admin-username" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#028090]" required placeholder="請輸入帳號">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                <input type="password" id="admin-password" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#028090]" required placeholder="請輸入密碼">
            </div>
            <div id="login-error" class="hidden text-red-500 text-sm text-center bg-red-50 p-2 rounded-lg mt-2">登入資訊錯誤。</div>
            <button type="submit" class="w-full bg-[#028090] hover:bg-[#0b4f4f] text-white font-bold py-3 rounded-xl transition-colors mt-4">登入系統</button>
        </form>
    </div>

    <!-- 後台主畫面 (登入後顯示) -->
    <div id="admin-content-view" class="hidden max-w-5xl mx-auto px-4 py-12">
        <header class="mb-8 border-b pb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">VITA CORE 後臺控制中心</h1>
                <p class="text-sm text-gray-500 mt-2">即時監控並回覆所有訪客提問</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm font-medium text-[#028090] bg-teal-50 px-4 py-2 rounded-full border border-teal-100 shadow-sm" id="logged-in-user"></span>
                <button id="admin-logout-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2 rounded-full text-sm font-semibold transition">登出</button>
            </div>
        </header>
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                💬 訪客客服問答 
                <span class="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full animate-pulse uppercase tracking-wider">Live</span>
            </h2>
            <div id="admin-chat-list" class="space-y-6 max-h-[600px] overflow-y-auto pr-4">
                <div class="text-center py-10">
                    <p class="text-gray-400 text-sm">正在載入客戶訊息...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, currentUser;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        try {
            const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) { console.error("Firebase 初始化失敗:", e); }

        const initAuth = async () => {
            if(!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth 失敗", err); }
        };

        const loginView = document.getElementById('admin-login-view');
        const contentView = document.getElementById('admin-content-view');
        
        function checkAdminAuth() {
            const currentAdmin = sessionStorage.getItem('adminAuthUser');
            if (currentAdmin) {
                loginView.classList.add('hidden');
                contentView.classList.remove('hidden');
                document.getElementById('logged-in-user').textContent = `👤 專員：${currentAdmin}`;
            } else {
                loginView.classList.remove('hidden');
                contentView.classList.add('hidden');
            }
        }

        document.getElementById('admin-login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('admin-username').value;
            const pass = document.getElementById('admin-password').value;
            
            // 驗證邏輯
            if ((user === 'admin' && pass === 'admin123') || 
                (user === 'yujonason84' && pass === 'En960315')) {
                
                sessionStorage.setItem('adminAuthUser', user);
                document.getElementById('login-error').classList.add('hidden');
                checkAdminAuth();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        document.getElementById('admin-logout-btn').addEventListener('click', () => {
            sessionStorage.removeItem('adminAuthUser');
            checkAdminAuth();
        });

        checkAdminAuth();

        window.adminReply = async (docId) => {
            const input = document.getElementById(`reply-${docId}`);
            if(input && input.value.trim() && currentUser && db) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chat', docId), {
                    reply: input.value.trim(),
                    repliedAt: new Date().toISOString()
                }, {merge: true});
                input.value = '';
            }
        };

        function startAdminListeners() {
            if(!db || !currentUser) return;
            const adminList = document.getElementById('admin-chat-list');
            
            onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'chat')), (snap) => {
                const msgs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp);
                
                if (msgs.length === 0) {
                    adminList.innerHTML = '<div class="text-center py-10"><p class="text-gray-400">目前沒有任何客戶訊息。</p></div>';
                    return;
                }

                const grouped = msgs.reduce((acc, m) => { 
                    acc[m.vid] = acc[m.vid] || []; 
                    acc[m.vid].push(m); 
                    return acc; 
                }, {});

                adminList.innerHTML = Object.entries(grouped).map(([vid, list]) => `
                    <div class="border border-gray-200 rounded-2xl p-6 bg-white shadow-sm">
                        <div class="flex items-center gap-2 border-b border-gray-100 pb-3 mb-4">
                            <span class="w-3 h-3 rounded-full bg-green-500"></span>
                            <h3 class="font-bold text-sm text-gray-700">訪客識別碼: <span class="font-mono text-[#028090]">${vid}</span></h3>
                        </div>
                        <div class="space-y-4">
                            ${list.map(m => `
                                <div>
                                    <div class="text-sm text-gray-800 bg-gray-50 p-4 rounded-xl border border-gray-100 font-medium break-words">
                                        <span class="text-gray-400 mr-1">💬</span> ${m.text}
                                    </div>
                                    ${m.reply 
                                        ? `<div class="text-sm text-[#0b4f4f] bg-teal-50/50 p-4 rounded-xl border border-teal-100 mt-2 flex items-start gap-2 break-words">
                                               <span>✅</span> <div><span class="font-bold block mb-1">專員已回覆：</span>${m.reply}</div>
                                           </div>` 
                                        : `<div class="flex gap-2 mt-2 ml-4">
                                                <input id="reply-${m.id}" type="text" class="border border-gray-200 flex-1 px-4 py-2.5 text-sm rounded-xl outline-none focus:ring-2 focus:ring-[#028090] bg-gray-50" placeholder="輸入回覆...">
                                                <button onclick="adminReply('${m.id}')" class="bg-[#028090] text-white px-6 py-2.5 text-sm font-bold rounded-xl hover:bg-[#0b4f4f] transition">送出</button>
                                           </div>`
                                    }
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            });
        }

        if(auth) {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if(user) startAdminListeners();
            });
            initAuth();
        }
    </script>
</body>
</html>
