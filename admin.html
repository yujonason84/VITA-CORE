<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITA CORE | 管理員後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro TC", "Helvetica Neue", sans-serif; }
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <!-- 側邊欄 -->
    <aside class="w-64 bg-[#1d1d1f] text-white flex flex-col shadow-xl z-10">
        <div class="p-8 border-b border-gray-800">
            <h1 class="text-xl font-bold tracking-widest uppercase mb-1">VITA CORE</h1>
            <p class="text-xs text-gray-400">Admin Control Center</p>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" class="block px-4 py-3 bg-[#0071e3] text-white rounded-xl font-semibold shadow-sm flex items-center gap-3">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                客服訊息中心
            </a>
            <a href="index.html" class="block px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition flex items-center gap-3 mt-4">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                返回前台網站
            </a>
        </nav>
        <div class="p-6 border-t border-gray-800 text-xs text-gray-500 text-center">
            System V1.0.0
        </div>
    </aside>

    <!-- 主畫面 -->
    <main class="flex-1 flex flex-col relative bg-gray-50/50">
        <header class="bg-white/80 backdrop-blur-md px-8 py-5 flex justify-between items-center shadow-sm z-10">
            <div>
                <h2 class="text-2xl font-bold tracking-tight text-gray-900">線上客服即時中心</h2>
                <p class="text-sm text-gray-500 mt-1">在這裡管理並即時回覆所有前台訪客的提問。</p>
            </div>
            <div class="flex items-center gap-2 bg-green-50 px-4 py-2 rounded-full border border-green-100">
                <div class="w-2.5 h-2.5 bg-green-500 rounded-full animate-pulse"></div>
                <span id="status" class="text-green-700 text-sm font-semibold">系統已連線</span>
            </div>
        </header>
        
        <div class="flex-1 p-8 overflow-y-auto">
            <div class="max-w-4xl mx-auto bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[calc(100vh-160px)]">
                <!-- 訊息列表區塊 -->
                <div id="admin-chat-list" class="flex-1 p-6 overflow-y-auto space-y-5 bg-[#fbfbfd]">
                    <div class="h-full flex flex-col items-center justify-center text-gray-400">
                        <svg class="animate-spin h-8 w-8 text-gray-300 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        正在與 Firebase 資料庫同步中...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase 與 JS 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        let db, auth, currentUser;

        try {
            const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch(e) { 
            console.warn("Firebase Init Error", e);
            document.getElementById('status').textContent = '本機展示模式';
            document.getElementById('status').parentElement.className = 'flex items-center gap-2 bg-yellow-50 px-4 py-2 rounded-full border border-yellow-100 text-yellow-700 text-sm font-semibold';
            
            // 展示模式假資料
            document.getElementById('admin-chat-list').innerHTML = `
                <div class="text-center text-gray-500 mt-10 p-6 bg-yellow-50 rounded-2xl border border-yellow-100">
                    <p class="font-bold mb-2">⚠️ 目前處於本機無資料庫狀態</p>
                    <p class="text-sm">若要測試真實連線，請確保您在具有 Firebase 環境的平台預覽，或將程式碼部署至伺服器。</p>
                </div>
            `;
        }

        const initAuth = async () => {
            if(!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth 失敗", err); }
        };

        if(auth) {
            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if(user && db) loadMessages();
            });
            initAuth();
        }

        // 讀取並渲染訊息
        function loadMessages() {
            const chatList = document.getElementById('admin-chat-list');
            
            // 監聽與前台 index.html 一模一樣的資料庫路徑
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'chat'), (snap) => {
                if (snap.empty) {
                    chatList.innerHTML = `
                        <div class="h-full flex flex-col items-center justify-center text-gray-400">
                            <svg class="w-12 h-12 mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                            目前沒有任何客戶訊息
                        </div>`;
                    return;
                }

                // 取得資料並依時間排序 (舊到新)
                const msgs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a, b) => a.timestamp - b.timestamp);
                
                chatList.innerHTML = msgs.map(m => {
                    const timeString = new Date(m.timestamp).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit', month:'short', day:'numeric'});
                    const isAnswered = m.reply !== null && m.reply !== '';

                    return `
                    <div class="bg-white p-5 rounded-2xl shadow-sm border ${isAnswered ? 'border-gray-100' : 'border-blue-200 ring-1 ring-blue-50'} transition-all">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-lg shadow-inner">👤</div>
                                <div>
                                    <span class="font-bold text-gray-900 text-sm">訪客 ID: <span class="font-mono text-[#0071e3]">${m.vid || '匿名訪客'}</span></span>
                                    <div class="text-[11px] text-gray-400">${timeString}</div>
                                </div>
                            </div>
                            ${!isAnswered ? '<span class="bg-blue-100 text-[#0071e3] text-xs px-2.5 py-1 rounded-full font-bold">待回覆</span>' : ''}
                        </div>
                        
                        <p class="text-gray-800 mb-4 bg-gray-50/80 p-4 rounded-xl text-sm border border-gray-100 leading-relaxed">${m.text}</p>
                        
                        ${isAnswered 
                            ? `<div class="bg-blue-50/50 border border-blue-100 p-4 rounded-xl text-sm flex gap-3">
                                 <div class="w-6 h-6 rounded-full bg-[#0071e3] text-white flex items-center justify-center text-xs flex-shrink-0 shadow-sm mt-0.5">V</div>
                                 <div>
                                     <strong class="text-blue-900 block mb-0.5">官方已回覆：</strong>
                                     <span class="text-gray-700">${m.reply}</span>
                                 </div>
                               </div>`
                            : `<div class="flex gap-2 relative">
                                 <input type="text" id="reply-input-${m.id}" class="flex-1 border border-gray-300 px-4 py-2.5 rounded-xl text-sm outline-none focus:border-[#0071e3] focus:ring-2 focus:ring-blue-100 transition-all bg-white" placeholder="輸入回覆給這位訪客...">
                                 <button onclick="sendReply('${m.id}')" class="bg-[#1d1d1f] hover:bg-black text-white px-6 py-2.5 rounded-xl text-sm font-semibold shadow-sm hover:shadow transition-all">送出回覆</button>
                               </div>`
                        }
                    </div>
                `}).join('');
                
                // 自動捲動到底部
                chatList.scrollTop = chatList.scrollHeight;
            }, (error) => {
                console.error("讀取訊息失敗", error);
                chatList.innerHTML = '<div class="text-center text-red-500 mt-10">讀取資料失敗，請檢查權限設定。</div>';
            });
        }

        // 發送回覆邏輯 (掛載到全域 window)
        window.sendReply = async (docId) => {
            const input = document.getElementById(`reply-input-${docId}`);
            const replyText = input.value.trim();
            
            if (!replyText || !db) return;
            
            // 變更按鈕為載入狀態
            const btn = input.nextElementSibling;
            const originalText = btn.textContent;
            btn.textContent = '傳送中...';
            btn.disabled = true;
            input.disabled = true;

            try {
                // 更新該筆訊息，加入 reply 欄位
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chat'), {
                    reply: replyText
                });
            } catch (e) {
                console.error("回覆失敗", e);
                alert("回覆失敗，請稍後再試！");
                btn.textContent = originalText;
                btn.disabled = false;
                input.disabled = false;
            }
        };
    </script>
</body>
</html>
